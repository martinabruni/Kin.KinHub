  deploy_prod:
    name: Deploy Prod
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: prod
    needs:
      - deploy_dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
