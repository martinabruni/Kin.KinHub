  #             location="${{ vars.AZURE_LOCATION }}" \
  #             staticWebAppLocation="${{ vars.STATIC_WEB_APP_LOCATION }}" \
  #             staticWebAppName="${{ vars.STATIC_WEB_APP_NAME }}" \
  #             webAppName="${{ vars.WEB_APP_NAME }}" \
  #             keyVaultName="${{ vars.KEY_VAULT_NAME }}" \
  #             sqlServerName="${{ vars.SQL_SERVER_NAME }}" \
