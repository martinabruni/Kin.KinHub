name: Frontend CI CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# -----------------------------------------------------------------------
# Project-specific configuration — change these to reuse in other projects
# -----------------------------------------------------------------------
env:
  FRONTEND_PATH: src/Presentations/Kin.KinHub.Core.React
  NODE_VERSION: 22
# -----------------------------------------------------------------------

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend_ci:
    name: Frontend Build
    # name: Frontend Build And Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.FRONTEND_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --include=optional

      - name: Build frontend
        run: npm run build

      # - name: Run frontend tests
      #   run: npm run test

  deploy_dev:
    name: Deploy Dev
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    needs:
      - frontend_ci

    defaults:
      run:
        working-directory: ${{ env.FRONTEND_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --include=optional

      - name: Build frontend
        env:
          VITE_CORE_URL: ${{ vars.VITE_CORE_URL }}
          VITE_IDENTITY_URL: ${{ vars.VITE_IDENTITY_URL }}
        run: npm run build

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.FRONTEND_PATH }}/dist
          config_file_location: ${{ env.FRONTEND_PATH }}
          output_location: ""
          skip_app_build: true

  # deploy_test:
  #   name: Deploy Test
  #   if: github.event_name != 'pull_request'
  #   runs-on: ubuntu-latest
  #   environment: test
  #   needs:
  #     - deploy_dev
  #
  #   defaults:
  #     run:
  #       working-directory: ${{ env.FRONTEND_PATH }}
  #
  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v4
  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: ${{ env.NODE_VERSION }}
  #         cache: npm
  #         cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json
  #
  #     - name: Install frontend dependencies
  #       run: npm ci --include=optional
  #
  #     - name: Build frontend
  #       env:
  #         VITE_CORE_URL: ${{ vars.VITE_CORE_URL }}
  #         VITE_IDENTITY_URL: ${{ vars.VITE_IDENTITY_URL }}
  #       run: npm run build
  #
  #     - name: Deploy Static Web App
  #       uses: Azure/static-web-apps-deploy@v1
  #       with:
  #         azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
  #         repo_token: ${{ secrets.GITHUB_TOKEN }}
  #         action: upload
  #         app_location: ${{ env.FRONTEND_PATH }}/dist
  #         config_file_location: ${{ env.FRONTEND_PATH }}
  #         output_location: ""
  #         skip_app_build: true

  deploy_prod:
    name: Deploy Prod
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: prod
    needs:
      - deploy_dev

    defaults:
      run:
        working-directory: ${{ env.FRONTEND_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --include=optional

      - name: Build frontend
        env:
          VITE_CORE_URL: ${{ vars.VITE_CORE_URL }}
          VITE_IDENTITY_URL: ${{ vars.VITE_IDENTITY_URL }}
        run: npm run build

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.FRONTEND_PATH }}/dist
          config_file_location: ${{ env.FRONTEND_PATH }}
          output_location: ""
          skip_app_build: true
